name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify version sources are in sync
        if: matrix.python-version == '3.12'
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          PACKAGE_VERSION=$(python -c "from metadata_remover import __version__; print(__version__)")
          if [ "${PYPROJECT_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "pyproject.toml (${PYPROJECT_VERSION}) and __init__.py (${PACKAGE_VERSION}) are out of sync"
            exit 1
          fi

      - name: Build package
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Verify build artifacts
        run: |
          test -f dist/*.whl
          test -f dist/*.tar.gz
          echo "Build artifacts verified"
